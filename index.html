<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namangan Gullar Festivali</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000 url('fvl3.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Меню ва Тугмалар дизайни */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            position: relative;
            background: rgba(255, 215, 0, 0.1);
            color: #fff;
            border: 2px solid #ffd700;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            outline: none;
            z-index: 101;
        }

        .nav-btn:hover {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 20px #ffd700;
        }

        /* Сочилувчи нуқталар учун махсус класс */
        .click-particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 9999;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        canvas {
            position: absolute;
            top: 0; left: 0; z-index: 2;
        }

        /* Марказий доира */
        .main-orb {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: clamp(280px, 80vw, 420px);
            height: clamp(280px, 80vw, 420px);
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            animation: rainbow-border 5s linear infinite, soft-pulse 3s ease-in-out infinite;
            display: flex; justify-content: center; align-items: center;
        }

        .inner-content {
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7) url('fvl2.jpg') no-repeat center center;
            background-size: cover;
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 50px #000;
        }

        h2 {
            color: #fff;
            font-size: clamp(30px, 12vw, 60px);
            font-weight: 900;
            text-shadow: 0 0 20px #ffd700;
        }

        @keyframes rainbow-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes soft-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body onclick="createBurst(event)">

    <div class="overlay"></div>
    
    <header>
        <nav>
            <button class="nav-btn" onclick="location.href='#'">Asosiy</button>
            <button class="nav-btn" onclick="location.href='history.html'">Tarix</button>
            <button class="nav-btn" onclick="location.href='galery.html'">Galereya</button>
            <button class="nav-btn" onclick="location.href='video.html'">Video</button>
            <button class="nav-btn" onclick="location.href='#'">Bog'lanish</button>
        </nav>
    </header>

    <canvas id="canvas"></canvas>

    <div class="main-orb">
        <div class="inner-content">
            <h2>NAMANGAN</h2>
        </div>
    </div>

    <script>
        // 1. Орқа фон анимацияси (Нуқталар)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const rainbowColors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = Math.random() * 3 + 1;
                this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
                if (this.life <= 0) this.init();
            }
        }

        for (let i = 0; i < 600; i++) { particles.push(new Particle()); }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. Сичқонча босилганда нуқталар сочилиши (7 рангли)
        function createBurst(e) {
            const count = 20; // Ҳар бир босишда чиқадиган нуқталар сони
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'click-particle';
                
                // 7 хил рангдан бирини танлаш
                const color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                p.style.background = color;
                p.style.boxShadow = `0 0 10px ${color}`;
                
                // Ўлчам
                const size = Math.random() * 8 + 4 + 'px';
                p.style.width = size;
                p.style.height = size;

                // Сичқонча координатаси
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';

                // Тасодифий йўналиш (портлаш эффекти)
                const dx = (Math.random() - 0.5) * 300 + 'px';
                const dy = (Math.random() - 0.5) * 300 + 'px';
                p.style.setProperty('--dx', dx);
                p.style.setProperty('--dy', dy);

                document.body.appendChild(p);

                // Анимация тугагач элементни ўчириш
                setTimeout(() => p.remove(), 800);
            }
        }
    </script>
</body>
</html>
