<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namangan Gullar Festivali | Video</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            background: #0b0f19;
            /* Расм линкини ўз лойиҳангизга мослаб олинг */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('image_74b4a6.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            position: sticky; top: 0; width: 100%; padding: 10px 0; z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-green);
        }

        nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px; }
        
        .nav-main-btn {
            background: transparent; color: #fff; border: 1px solid var(--gold);
            padding: 8px 15px; border-radius: 5px; cursor: pointer;
            text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }

        .nav-main-btn:hover { background: var(--gold); color: #000; }

        .main-container {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 15px;
        }

        .video-display-area {
            background: rgba(255, 255, 255, 0.07);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        .video-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info h2 { color: var(--gold); margin: 15px 0 10px; font-size: 1.4rem; }
        .video-info p { color: #ddd; line-height: 1.5; font-size: 0.95rem; }

        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .sidebar h3 { 
            color: var(--neon-green); text-align: center; margin: 0 0 10px; 
            letter-spacing: 2px; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .video-btn {
            background: rgba(0, 0, 0, 0.7);
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .video-btn:hover {
            background: var(--neon-green);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(57, 255, 20, 0.4);
        }

        .click-particle {
            position: fixed; pointer-events: none; border-radius: 50%;
            z-index: 9999; animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        @media (max-width: 950px) {
            .main-container { grid-template-columns: 1fr; margin: 10px auto; }
            .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .sidebar h3 { grid-column: span 2; }
        }

        @media (max-width: 600px) {
            .sidebar { grid-template-columns: 1fr; }
            .sidebar h3 { grid-column: span 1; }
            .video-info h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body onclick="createBurst(event)">

    <header>
        <nav>
            <button class="nav-main-btn" onclick="location.href='index.html'">Asosiy</button>
            <button class="nav-main-btn" onclick="location.href='galery.html'">Galereya</button>
            <button class="nav-main-btn" onclick="location.href='history.html'">Tarix</button>
            <button class="nav-main-btn" style="background: var(--neon-green); color: #000; border-color: var(--neon-green);">Video</button>
            <button class="nav-main-btn">Bog'lanish</button>
        </nav>
    </header>

    <div class="main-container">
        <article class="video-display-area">
            <div class="video-box" id="video-wrapper">
                <iframe id="main-video" src="https://www.youtube.com/embed/5aRrpHsCuz4" allowfullscreen></iframe>
            </div>

            <div class="video-info">
                <h2 id="video-title">Наманган: Халқаро "Гуллар фестивали" очилиш маросими.</h2>
                <p id="video-desc">65-халқаро Гуллар фестивалининг тантанали очилиш маросимидан лавҳалар.</p>
            </div>
        </article>

        <aside class="sidebar">
            <h3>VIDEOLAR РЎЙХАТИ</h3>
            
            <button class="video-btn" onclick="changeVideo('FB', 'https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Ftoxirjon.dedaxanov%2Fvideos%2F944498645230580%2F', 'Gullar festivali ochilishi', 'Фестивалнинг очилиш маросимидан Фейсбук лавҳаси.')">
                <span>▶</span> Gullar festivali ochilishi
            </button>

            <button class="video-btn" onclick="changeVideo('FB', 'https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2Ftoxirjon.dedaxanov%2Fvideos%2F1983699838942544%2F', '65-Гуллар фестивали тайёргарлиги', 'Фестивалга қизғин тайёргарлик жараёни (FB видео).')">
                <span>🎬</span> 65-Гуллар фестивали тайёргарлик
            </button>

            <button class="video-btn" onclick="changeVideo('YT', '9Aqqehb9Tac', 'Gullar Karvoni', 'Shahar ko\'chalari bo\'ylab о\'тган мафтункор гуллар автокарвони.')">
                <span>▶</span> Gullar Karvoni (YouTube)
            </button>

            <button class="video-btn" onclick="changeVideo('YT', '9UWULfHHJhg', 'Kechki Konsert', 'Festival доирасидаги гала-консерт ва мушакбозлик шоуси.')">
                <span>▶</span> Kechki Konsert
            </button>

        </aside>
    </div>

    <script>
        const rainbowColors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'];

        function changeVideo(type, source, title, desc) {
            const player = document.getElementById('main-video');
            const videoWrapper = document.getElementById('video-wrapper');
            
            if (type === 'YT') {
                // YouTube формати
                player.src = `https://www.youtube.com/embed/${source}?autoplay=1&rel=0`;
                videoWrapper.style.paddingTop = "56.25%"; 
            } else if (type === 'FB') {
                // Facebook формати
                player.src = source;
                videoWrapper.style.paddingTop = "56.25%"; 
            }

            document.getElementById('video-title').innerText = title;
            document.getElementById('video-desc').innerText = desc;
            
            // Тепага силлиқ қайтиш
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Рангли заррачалар эффекти
        function createBurst(e) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'click-particle';
                p.style.background = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                p.style.width = Math.random() * 6 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }
    </script>
</body>
</html>
